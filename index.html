<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zubiverse</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:"Space Grotesk",sans-serif;
background:#000;
color:white;
overflow-x:hidden;

}

/* HERO */

.hero{

height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;

background:
radial-gradient(circle at 20% 30%,#4c1d95 0%,transparent 35%),
radial-gradient(circle at 80% 70%,#f59e0b 0%,transparent 35%),
#000;

}

/* NEBULA */

.hero::before{

content:"";
position:absolute;
width:160%;
height:160%;

background:

radial-gradient(circle at 40% 50%,rgba(168,85,247,.4),transparent 40%),
radial-gradient(circle at 70% 60%,rgba(245,158,11,.4),transparent 40%);

filter:blur(120px);

animation:nebula 25s linear infinite;

}

@keyframes nebula{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

/* PLANET */

.planet{

position:absolute;

width:520px;
height:520px;

border-radius:50%;

background:

radial-gradient(circle at 30% 30%,#ffd84a,#f59e0b,#3b0764);

box-shadow:

0 0 120px rgba(255,200,0,.4);

animation:spin 50s linear infinite;

z-index:1;

}

@keyframes spin{

from{transform:rotate(0deg)}
to{transform:rotate(360deg)}

}

/* CONTENT */

.content{

position:relative;
z-index:2;
max-width:900px;

}

/* TITLE */

.title{

font-family:"Orbitron",sans-serif;
font-size:64px;
letter-spacing:3px;

background:linear-gradient(90deg,#fff,#ffd84a,#fff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:

0 0 25px rgba(255,216,74,.6);

margin-bottom:20px;

}

/* TEXT */

.tagline{

font-size:22px;
margin-bottom:10px;
opacity:.9;

}

.sub{

font-size:18px;
opacity:.75;

}

/* STARS */

.stars span{

position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;

animation:starMove 14s linear infinite;

}

@keyframes starMove{

0%{transform:translateY(0)}
100%{transform:translateY(-1200px)}

}

/* BOT */

.bot{

position:fixed;
right:30px;
bottom:30px;

width:70px;
height:70px;

border-radius:50%;

background:linear-gradient(135deg,#ffd84a,#f59e0b);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

cursor:pointer;

box-shadow:0 15px 40px rgba(0,0,0,.4);

}

</style>

</head>

<body>

<section class="hero">

<div class="planet"></div>

<div class="stars">

<span style="left:10%;top:90%"></span>
<span style="left:30%;top:85%"></span>
<span style="left:50%;top:95%"></span>
<span style="left:70%;top:88%"></span>
<span style="left:90%;top:92%"></span>

</div>

<div class="content">

<h1 class="title">WELCOME TO ZUBIVERSE</h1>

<p class="tagline">
Connecting Knowledge, Markets, and Digital Opportunities.
</p>

<p class="sub">
Welcome to a ZubiVerse where vision evolves into real digital possibilities.
</p>

</div>

</section>

<div class="bot">🤖</div>

</body>
</html>
