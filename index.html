<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zubolaa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;

}

/* HERO */

.hero{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

background:

linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.85)
),

url("zubolaa-bg.jpg");

background-size:cover;
background-position:center;

}

/* CONTENT */

.content{

max-width:900px;
padding:20px;

}

/* TITLE */

.title{

font-size:70px;
letter-spacing:4px;
font-weight:700;

background:linear-gradient(90deg,#fff,#ffd84a,#fff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 25px rgba(255,216,74,.6),
0 0 40px rgba(255,216,74,.4);

margin-bottom:25px;

}

/* TAGLINE */

.tagline{

font-size:22px;
margin-bottom:10px;
opacity:.9;

}

/* SUB TEXT */

.sub{

font-size:18px;
opacity:.8;

}

/* BOT */

.bot{

position:fixed;
right:30px;
bottom:30px;

width:70px;
height:70px;

border-radius:50%;

background:linear-gradient(135deg,#ffd84a,#f59e0b);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

cursor:pointer;

box-shadow:0 15px 40px rgba(0,0,0,.4);

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<h1 class="title">WELCOME TO ZUBOLAA</h1>

<p class="tagline">
Connecting Knowledge, Markets, and Digital Opportunities.
</p>

<p class="sub">
Welcome to the Zubolaa ecosystem where vision evolves into real digital possibilities.
</p>

</div>

</section>

<div class="bot">🤖</div>

</body>

</html>
